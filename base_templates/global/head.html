{% load static %}
<!doctype html>
<html lang="pt-br" style="height: 100%;">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard de Receitas Municipais</title>

    <!-- CSS global -->
    <link rel="stylesheet" href="{% static 'global/css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    {% block extra_head %}{% endblock extra_head %}
</head>
<body>

<div class="page-header">
    <div class="container">
        <header>
            <!-- Logo à esquerda -->
            <a href="/" class="d-flex align-items-center text-dark text-decoration-none">
                <img src="{% static 'global/images/logo-FNP.png' %}" alt="Logo FNP" class="logo-fnp">
            </a>

            <!-- Menu centralizado -->
            <ul class="nav">
                <li>
                    <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                        Análise Gráfica
                    </a>
                </li>
                <li>
                    <a href="/mapa" class="nav-link {% if request.path == '/mapa' %}active{% endif %}">
                        Visualização no Mapa
                    </a>
                </li>
                <li>
                    <a href="/analise-municipal" class="nav-link {% if request.path == '/analise-municipal' %}active{% endif %}">
                        Análise Municipal
                    </a>
                </li>
            </ul>
        </header>
    </div>
</div>

{% block content %}{% endblock content %}

</body>
</html>
