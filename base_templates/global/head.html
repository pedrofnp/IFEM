{% load static %}
<!doctype html>
<html lang="pt-br" style="height: 100%;">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard de Receitas Municipais</title>

<!-- Bootstrap: todos usam -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fonte Inter: todos usam -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- CSS global compartilhado -->
<link rel="stylesheet" href="{% static 'global/css/style.css' %}">

    {% block extra_head %}{% endblock extra_head %}
</head>
<body>

<div class="page-header">
    <div class="container">
        <header>
            <!-- Logo à esquerda -->
            <a href="/" class="d-flex align-items-center text-dark text-decoration-none">
                <img src="{% static 'global/images/logo-FNP.png' %}" alt="Logo FNP" class="logo-fnp">
            </a>

           <!-- Menu centralizado -->
            {% with p=request.path %}
            <ul class="nav">
            <li>
                <a href="/" class="nav-link {% if p == '/' %}active{% endif %}">
                Análise Gráfica
                </a>
            </li>

            <li>
                <a href="/mapa" class="nav-link {% if p == '/mapa' %}active{% endif %}">
                Visualização no Mapa
                </a>
            </li>

            <li>
                <a href="/analise-municipal"
                class="nav-link {% if p == '/analise-municipal/' or '/municipio/' in p %}active{% endif %}">
                Análise Municipal
                </a>
            </li>
            </ul>
            {% endwith %}

        </header>
    </div>
</div>

{% block content %}{% endblock content %}

</body>
</html>
