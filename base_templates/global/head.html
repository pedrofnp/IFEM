{% load static %}
<!doctype html>
<html lang="pt-br" style="height: 100%;">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1366">
    <title>Dashboard de Receitas Municipais</title>

<!-- Bootstrap: todos usam -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<!-- Fonte Inter: todos usam -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- CSS global compartilhado -->
<link rel="stylesheet" href="{% static 'global/css/style.css' %}">
<script defer src="{% static 'global/js/tooltips-init.js' %}"></script>


    {% block extra_head %}{% endblock extra_head %}


<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ABC123XYZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-ABC123XYZ');
</script>

</head>
<body>

<div class="page-header">
  <div class="container">
    <header class="d-flex align-items-center justify-content-between">

      <!--  Marca à ESQUERDA -->
      <a href="/" class="d-flex align-items-center text-dark text-decoration-none">
        <img src="{% static 'global/images/ifem-marca-03.svg' %}" alt="Marca IFEM" class="logo-ifem">
      </a>

      <!-- Menu CENTRALIZADO -->
      {% with p=request.path %}
      <nav class="flex-grow-1 d-flex justify-content-center">
        <ul class="nav">
          
          <li>
            <a href="{% url 'home' %}" class="nav-link {% if '/analise/' in p %}active{% endif %}">
              Análise Gráfica
            </a>
          </li>

          <li>
            <a href="{% url 'mapa' %}" class="nav-link {% if '/mapa/' in p or '/municipio/' in p %}active{% endif %}">
              Análise Municipal
            </a>
          </li>

          <li>
            <a href="{% url 'analise_municipal' %}" class="nav-link {% if '/analise-municipal/' in p %}active{% endif %}">
              Análise Agregada
            </a>
          </li>

        </ul>
      </nav>
      {% endwith %}

      <!-- Logo FNP à DIREITA (abre site oficial) -->
      <a href="https://fnp.org.br/" target="_blank" rel="noopener" class="d-flex align-items-center text-dark text-decoration-none">
        <img src="{% static 'global/images/logo-FNP.png' %}" alt="Logo FNP" class="logo-fnp">
      </a>

    </header>
  </div>
</div>


{% block content %}{% endblock content %}

</body>
</html>
