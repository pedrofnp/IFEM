{% extends "global/head.html" %}
{% load static %}

{% block extra_head %}
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">  
  <link rel="stylesheet" href="{% static 'map/css/style.css' %}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!--  Dependências do modal de busca -->
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="{% static 'global/js/tooltips-init.js' %}"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
  <script defer src="{% static 'global/js/search-modal.js' %}"></script>
{% endblock extra_head %}

{% block content %}
<main class="content-wrapper map-page">
  <!-- SIDEBAR PADRONIZADA -->
  <aside class="sidebar">
      <div class="d-flex align-items-center mb-1">
        <h4 class="mb-0 me-1">Distribuição Geográfica</h4>
        <button type="button"
              class="btn-info-tooltip"
              data-bs-toggle="tooltip"
              data-bs-placement="right"
              data-bs-html="true"
              title="Este mapa mostra a distribuição geográfica dos municípios selecionados. <br>Cada ponto é clicável e o tamanho da sua circunferência demonstra o tamanho populacional do município.">
          <i class="fa-solid fa-circle-info text-secondary"></i>
        </button>
      </div>
    <hr>

    <div id="filters">
      <!-- Faixa Populacional -->
      <div class="filter-group">
        <label for="filtro-porte" class="form-label">Faixa Populacional:</label>
        <div class="input-group input-group-sm">
          <select id="filtro-porte" class="form-select form-select-sm">
            <option value="todos">Todos</option>
            <option value="Até 5 mil">Até 5 mil</option>
            <option value="5 mil a 10 mil">5 mil a 10 mil</option>
            <option value="10 mil a 20 mil">10 mil a 20 mil</option>
            <option value="20 mil a 50 mil">20 mil a 50 mil</option>
            <option value="50 mil a 100 mil">50 mil a 100 mil</option>
            <option value="100 mil a 200 mil">100 mil a 200 mil</option>
            <option value="200 mil a 500 mil">200 mil a 500 mil</option>
            <option value="Acima de 500 mil">Acima de 500 mil</option>
          </select>
          <button type="button" class="btn btn-outline-secondary btn-sm" data-search-for="#filtro-porte" title="Buscar na lista">
            <!-- ícone lupa -->
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                 viewBox="0 0 16 16" fill="currentColor">
              <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 
                       1.415-1.414l-3.85-3.85zm-5.242.656a5 5 0 1 1 
                       0-10 5 5 0 0 1 0 10z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Região Metropolitana -->
      <div class="filter-group">
        <label for="filtro-rm" class="form-label">Região Metropolitana:</label>
        <div class="input-group input-group-sm">
          <select id="filtro-rm" class="form-select form-select-sm">
            <option value="todos">Todas</option>
          </select>
          <button type="button"
                  class="btn btn-outline-secondary btn-sm"
                  data-search-for="#filtro-rm"
                  title="Buscar na lista">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                viewBox="0 0 16 16" fill="currentColor">
              <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85zm-5.242.656a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
            </svg>
          </button>
        </div>
      </div>


      <!-- Região -->
      <div class="filter-group">
        <label for="filtro-regiao" class="form-label">Região:</label>
        <div class="input-group input-group-sm">
          <select id="filtro-regiao" class="form-select form-select-sm">
            <option value="todos">Todas</option>
          </select>
          <button type="button" class="btn btn-outline-secondary btn-sm" data-search-for="#filtro-regiao" title="Buscar na lista">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                 viewBox="0 0 16 16" fill="currentColor">
              <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 
                       1.415-1.414l-3.85-3.85zm-5.242.656a5 5 0 1 1 
                       0-10 5 5 0 0 1 0 10z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- UF -->
      <div class="filter-group">
        <label for="filtro-uf" class="form-label">UF:</label>
        <div class="input-group input-group-sm">
          <select id="filtro-uf" class="form-select form-select-sm">
            <option value="todos">Todas</option>
          </select>
          <button type="button" class="btn btn-outline-secondary btn-sm" data-search-for="#filtro-uf" title="Buscar na lista">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                 viewBox="0 0 16 16" fill="currentColor">
              <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 
                       1.415-1.414l-3.85-3.85zm-5.242.656a5 5 0 1 1 
                       0-10 5 5 0 0 1 0 10z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Município -->
      <div class="filter-group">
        <label for="filtro-municipio" class="form-label">Município:</label>
        <div class="input-group input-group-sm">
          <select id="filtro-municipio" class="form-select form-select-sm">
            <option value="todos">Todos</option>
          </select>
          <button type="button"
                  class="btn btn-outline-secondary btn-sm"
                  data-search-for="#filtro-municipio"
                  title="Buscar na lista">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                viewBox="0 0 16 16" fill="currentColor">
              <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85zm-5.242.656a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
            </svg>
          </button>
        </div>
      </div>


      <!-- Colorir por -->
      <div class="filter-group">
        <label for="filtro-classificacao" class="form-label">Colorir por:</label>
        <select id="filtro-classificacao" class="form-select form-select-sm">
          <option value="quintil" selected>Quintis de Receita p/c</option>
          <option value="decil">Decis de Receita p/c</option>
          <option value="natural">Quebras Naturais (Receita)</option>
        </select>
      </div>

      <!-- Subgrupo (Quintil/Decil) -->
      <div class="filter-group">
        <label for="filtro-subgrupo" class="form-label">Quintil:</label>
        <select id="filtro-subgrupo" class="form-select form-select-sm"></select>
      </div>

      <!-- Modo de cálculo -->
      <div class="filter-group">
        <label for="filtro-modo-calculo" class="form-label">Cálculo do Quantil:</label>
        <select id="filtro-modo-calculo" class="form-select form-select-sm">
          <option value="total">País (Total)</option>
          <option value="por_filtro">Filtro Atual</option>
        </select>
      </div>
    </div>

    <div class="d-grid gap-2 mt-3">

      <button id="btn-limpar-filtros" class="btn btn-secondary w-100">
        <i class="bi bi-eraser-fill"></i> Limpar Filtros
      </button>

    <button id="btn-screenshot"
            type="button"
            class="btn btn-secondary w-100 d-flex align-items-center justify-content-center gap-2">
      
      <!-- Ícone recomendado (Opção 3) -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
          viewBox="0 0 24 24" fill="currentColor">
        <path d="M21 7h-2.586l-1.707-1.707A2 2 0 0 0 15 4H9a2 2 0 0 0-1.707.293L5.586 7H3a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Zm-9 10a4 4 0 1 1 0-8 4 4 0 0 1 0 8Z"/>
      </svg>

      <span>Print Mapa</span>
    </button>

    </div>

    <!-- Espaço que empurra o botão final para o rodapé da sidebar -->
    <div class="sidebar-spacer"></div>

    <!-- Botão fixado no rodapé -->
    <button id="download-table-btn"
            type="button"
            class="btn btn-secondary w-100 d-flex align-items-center justify-content-center gap-2 btn-download">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V3.5a.5.5 0 0 0-1 0v6.793L5.354 8.146a.5.5 0 1 0-.708.708z"/>
        <path d="M.5 12.9v1a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-1a.5.5 0 0 0-1 0v1a1 1 0 0 1-1 1H2.5a1 1 0 0 1-1-1v-1a.5.5 0 0 0-1 0z"/>
      </svg>
      <span>Baixar Dados</span>
    </button>


  </aside>

  <!-- CONTEÚDO DO MAPA -->
  <div class="main-content">
    <div id="map"></div>

    <div class="map-overlay-container">
      <div id="summary-card">
        <h5>Resumo do Filtro</h5>
        <p><strong>Municípios na seleção:</strong><br> <span id="summary-count">0</span></p>
        <p><strong>Receita Per Capita Média:</strong><br> <span id="summary-avg-revenue">R$ 0,00</span></p>
      </div>
      <div id="legend"></div>
    </div>
  </div>
</main>

<!-- JS específicos do mapa -->
<script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
<script>
  window.MAPBOX_PUBLIC_TOKEN = "{{ MAPBOX_PUBLIC_TOKEN|escapejs }}";
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  window.LOGO_IFEM_URL = "{% static 'global/images/ifem-marca-03.png' %}";
  window.LOGO_FNP_URL  = "{% static 'global/images/logo-FNP.png' %}";
</script>

<script src="{% static 'map/js/script.js' %}"></script>

<!-- Modal de busca reutilizável -->
<div id="search-modal" class="modal fade" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header py-2">
        <input id="search-input" class="form-control" placeholder="Digite para buscar..." />
        <button type="button" class="btn-close ms-2" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body p-0">
        <ul id="search-list" class="list-group list-group-flush"></ul>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
