{% extends "global/head.html" %}
{% load static %}

{% block extra_head %}
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'map/css/style.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock extra_head %}


{% block content %}
<main class="content-wrapper map-page">
  <!-- SIDEBAR PADRONIZADA -->
  <aside class="sidebar">
    <h4 class="d-flex justify-content-between align-items-center">
      Filtros
      <a href="#" id="download-table-btn" class="btn btn-sm btn-outline-secondary" title="Baixar Dados da Tabela">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-download" viewBox="0 0 16 16">
          <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
          <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V3.5a.5.5 0 0 0-1 0v6.793L5.354 8.146a.5.5 0 1 0-.708.708z"/>
        </svg>
      </a>
    </h4>
    <hr>

    <div id="filters">
      <div class="filter-group">
        <label for="filtro-porte" class="form-label">Faixa Populacional:</label>
        <select id="filtro-porte" class="form-select form-select-sm">
          <option value="todos">Todos</option>
          <option value="Até 5 mil">Até 5 mil</option>
          <option value="5 mil a 10 mil">5 mil a 10 mil</option>
          <option value="10 mil a 20 mil">10 mil a 20 mil</option>
          <option value="20 mil a 50 mil">20 mil a 50 mil</option>
          <option value="50 mil a 100 mil">50 mil a 100 mil</option>
          <option value="100 mil a 200 mil">100 mil a 200 mil</option>
          <option value="200 mil a 500 mil">200 mil a 500 mil</option>
          <option value="Acima de 500 mil">Acima de 500 mil</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filtro-rm" class="form-label">Região Metropolitana:</label>
        <select id="filtro-rm" class="form-select form-select-sm">
          <option value="todos">Todas</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filtro-regiao" class="form-label">Região:</label>
        <select id="filtro-regiao" class="form-select form-select-sm">
          <option value="todos">Todas</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filtro-uf" class="form-label">UF:</label>
        <select id="filtro-uf" class="form-select form-select-sm">
          <option value="todos">Todos</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filtro-municipio" class="form-label">Município:</label>
        <select id="filtro-municipio" class="form-select form-select-sm">
          <option value="todos">Todos</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filtro-classificacao" class="form-label">Colorir por:</label>
        <select id="filtro-classificacao" class="form-select form-select-sm">
          <option value="quintil" selected>Quintis de Receita p/c</option>
          <option value="decil">Decis de Receita p/c</option>
          <option value="natural">Quebras Naturais (Receita)</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filtro-subgrupo" class="form-label">Quintil:</label>
        <select id="filtro-subgrupo" class="form-select form-select-sm"></select>
      </div>

      <div class="filter-group">
        <label for="filtro-modo-calculo" class="form-label">Cálculo do Quantil:</label>
        <!-- ATENÇÃO: .form-select .form-select-sm para o caret do Bootstrap -->
        <select id="filtro-modo-calculo" class="form-select form-select-sm">
            <option value="total">País (Total)</option>
            <option value="por_filtro">Filtro Atual</option>
        </select>
      </div>
    </div>

    <div class="d-grid mt-3">
     <button id="btn-limpar-filtros" class="btn btn-secondary">
        <i class="bi bi-eraser-fill"></i> Limpar Pesquisa
    </button>
    </div>
  </aside>

  <!-- CONTEÚDO DO MAPA -->
  <div class="main-content">
    <div id="map"></div>

    <div class="map-overlay-container">
      <div id="summary-card">
        <h5>Resumo do Filtro</h5>
        <p><strong>Municípios na seleção:</strong><br> <span id="summary-count">0</span></p>
        <p><strong>Receita Per Capita Média:</strong><br> <span id="summary-avg-revenue">R$ 0,00</span></p>
      </div>
      <div id="legend"></div>
    </div>
  </div>
</main>

<!-- JS específicos do mapa -->
<script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
<script src="{% static 'map/js/script.js' %}"></script>
{% endblock content %}
