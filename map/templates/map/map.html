{% extends "global/head.html" %}
{% load static %}

{% block extra_head %}
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">  
  <link rel="stylesheet" href="{% static 'map/css/style.css' %}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!--  Dependências do modal de busca -->
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="{% static 'global/js/tooltips-init.js' %}"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
  <script defer src="{% static 'global/js/search-modal.js' %}"></script>
{% endblock extra_head %}

{% block content %}
<main class="content-wrapper map-page">

 <style>
    /* ========== Ajustes Mobile ========== */
    @media (max-width: 991.98px) {
      #filtrosOffcanvas {
        position: fixed !important;
        bottom: 0 !important;
        top: auto !important;
        left: 0 !important;
        width: 100% !important;
        height: 80vh !important; 
        max-height: 80vh !important;
        background-color: #ffffff !important;
        z-index: 10000 !important;
        visibility: visible !important;
      }
      .map-page { display: block !important; }
      
      .map-page .main-content {
        height: calc(100vh - 70px) !important;
        width: 100% !important;
        position: relative !important;
      }
      
      .map-page #map {
        position: absolute !important;
        top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
      }

      .map-overlay-container { transform: scale(0.8) !important; transform-origin: bottom right !important; margin-bottom: 25px !important; }
      .mapboxgl-popup { max-width: 65vw !important; min-width: 180px !important; z-index: 3000 !important; }
      .mapboxgl-popup-content { padding: 6px 8px !important; font-size: 0.65rem !important; }
      
      .offcanvas-backdrop { display: none !important; }
    }

    /* ========== Ajustes Desktop (Layout em GRID Blindado) ========== */
    @media (min-width: 992px) {
      body { overflow: hidden !important; }
      
      /* Substitui o Flexbox problemático por um Grid sólido */
      .map-page {
        display: grid !important;
        /* Coluna 1: 320px exatos. Coluna 2: 1fr (o que sobrar da tela) */
        grid-template-columns: 320px 1fr !important;
        /* Linha única com a altura exata da visão menos o header */
        grid-template-rows: calc(100vh - 70px) !important;
        width: 100vw !important;
        overflow: hidden !important;
      }
      
      /* Sidebar: Colada na Coluna 1 do Grid com Scroll */
      .sidebar {
        width: 100% !important;
        height: 100% !important;
        background-color: #fff !important;
        border-right: 1px solid #dee2e6;
        position: relative !important;
        visibility: visible !important;
        transform: none !important;
        /* Rolagem ativada para salvar os botões */
        overflow-y: auto !important; 
        overflow-x: hidden !important;
        /* Reseta comportamentos offcanvas */
        display: block !important; 
      }
      
      /* Evita que a div interna force altura e esconda itens */
      #filtrosOffcanvas .offcanvas-body { 
        height: auto !important;
        padding-bottom: 3rem !important; /* Espaço extra abaixo do botão de download */
      }

      /* Container do Mapa: Colado na Coluna 2 do Grid */
      .main-content {
        width: 100% !important;
        height: 100% !important;
        position: relative !important;
      }
      
      /* O Mapa assume as dimensões perfeitas do Container (Coluna 2) */
      #map {
        position: absolute !important;
        top: 0 !important; bottom: 0 !important; left: 0 !important; right: 0 !important;
      }
    }

    /* Camadas do modal de busca */
    .modal { z-index: 11000 !important; }
    .modal-backdrop { z-index: 10500 !important; }

/* ========== Padronização do Menu Superior (Fundo Branco) ========== */
    .dropdown-menu {
      background-color: #ffffff !important;
      border: 1px solid #e9ecef !important;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1) !important;
    }
    
    .dropdown-item {
      background-color: #ffffff !important;
      color: #333333 !important;
    }
    
    .dropdown-item:hover, 
    .dropdown-item:focus {
      background-color: #f0f4f8 !important; 
      color: #103758 !important;
    }

    /* ========== Destaque Exclusivo: Análise Municipal (2º Item do Menu) ========== */
    .dropdown-menu li:nth-child(2) .dropdown-item,
    .dropdown-menu > .dropdown-item:nth-child(2),
    .dropdown-item[href*="/mapa"],
    .dropdown-item[href*="/municipio"] {
      color: #103758 !important;
      font-weight: 700 !important;
    }

  </style>

  <aside class="sidebar offcanvas-lg offcanvas-bottom shadow-lg" tabindex="-1" id="filtrosOffcanvas" aria-labelledby="filtrosOffcanvasLabel" data-bs-backdrop="false">
    <div class="offcanvas-header d-lg-none border-bottom bg-white p-0" style="position: relative; height: 70px; z-index: 1055;">
      <div class="w-100 d-flex justify-content-center align-items-center h-100">
        <i class="fa-solid fa-sliders fs-5 me-2" style="color: #103758;"></i>
        <h5 class="offcanvas-title fw-bold mb-0 text-nowrap" id="filtrosOffcanvasLabel" style="color: #103758; font-size: 1.15rem;">
          Filtros do Mapa
        </h5>
      </div>
      <button type="button" data-bs-dismiss="offcanvas" data-bs-target="#filtrosOffcanvas" aria-label="Fechar" 
              style="position: absolute !important; top: -12px !important; right: -12px !important; width: 32px !important; height: 32px !important; border-radius: 50% !important; border: none !important; background-color: #e2e8f0 !important; color: #103758 !important; padding: 0 !important; display: flex !important; justify-content: center !important; align-items: center !important; cursor: pointer !important; z-index: 9999 !important; box-shadow: none !important;">
        <i class="fa-solid fa-xmark" style="font-size: 16px; pointer-events: none !important; margin: 0 !important; padding: 0 !important;"></i>
      </button>
    </div>

    <div class="offcanvas-body d-flex flex-column px-4 py-4 p-lg-0" style="background-color: #ffffff;">
      
      <div class="d-none d-lg-flex align-items-center mb-1">
        <h4 class="mb-0 me-1">Distribuição Geográfica</h4>
        <button type="button" class="btn-info-tooltip shadow-none border-0 bg-transparent p-0" data-bs-toggle="tooltip" data-bs-placement="right" data-bs-html="true" title="Este mapa mostra a distribuição geográfica dos municípios selecionados. <br>Cada ponto é clicável e o tamanho da sua circunferência demonstra o tamanho populacional do município.">
          <i class="fa-solid fa-circle-info text-secondary"></i>
        </button>
      </div>
      <hr class="d-none d-lg-block">

      <div id="filters">
        
        <div class="filter-group">
          <label for="filtro-porte" class="form-label">Faixa Populacional:</label>
          <div class="input-group input-group-sm">
            <select id="filtro-porte" class="form-select form-select-sm">
              <option value="todos">Todos</option>
              <option value="Até 5 mil">Até 5 mil</option>
              <option value="5 mil a 10 mil">5 mil a 10 mil</option>
              <option value="10 mil a 20 mil">10 mil a 20 mil</option>
              <option value="20 mil a 50 mil">20 mil a 50 mil</option>
              <option value="50 mil a 100 mil">50 mil a 100 mil</option>
              <option value="100 mil a 200 mil">100 mil a 200 mil</option>
              <option value="200 mil a 500 mil">200 mil a 500 mil</option>
              <option value="Acima de 500 mil">Acima de 500 mil</option>
              
              <option disabled>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;──────────&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</option>
              
              <option value="Acima de 80 mil">Acima de 80 mil</option>
              <option value="Abaixo de 80 mil">Abaixo de 80 mil</option>
            </select>
            <button type="button" class="btn btn-sm text-white px-3 shadow-none" data-search-for="#filtro-porte" title="Buscar na lista" style="background-color: #103758; border: none; border-radius: 0 4px 4px 0;">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
        </div>

        <div class="filter-group">
          <label for="filtro-rm" class="form-label">Região Metropolitana:</label>
          <div class="input-group input-group-sm">
            <select id="filtro-rm" class="form-select form-select-sm"><option value="todos">Todas</option></select>
            <button type="button" class="btn btn-sm text-white px-3 shadow-none" data-search-for="#filtro-rm" title="Buscar na lista" style="background-color: #103758; border: none; border-radius: 0 4px 4px 0;">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
        </div>

        <div class="filter-group">
          <label for="filtro-regiao" class="form-label">Região:</label>
          <div class="input-group input-group-sm">
            <select id="filtro-regiao" class="form-select form-select-sm"><option value="todos">Todas</option></select>
            <button type="button" class="btn btn-sm text-white px-3 shadow-none" data-search-for="#filtro-regiao" title="Buscar na lista" style="background-color: #103758; border: none; border-radius: 0 4px 4px 0;">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
        </div>

        <div class="filter-group">
          <label for="filtro-uf" class="form-label">UF:</label>
          <div class="input-group input-group-sm">
            <select id="filtro-uf" class="form-select form-select-sm"><option value="todos">Todas</option></select>
            <button type="button" class="btn btn-sm text-white px-3 shadow-none" data-search-for="#filtro-uf" title="Buscar na lista" style="background-color: #103758; border: none; border-radius: 0 4px 4px 0;">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
        </div>

        <div class="filter-group">
          <label for="filtro-municipio" class="form-label">Município:</label>
          <div class="input-group input-group-sm">
            <select id="filtro-municipio" class="form-select form-select-sm"><option value="todos">Todos</option></select>
            <button type="button" class="btn btn-sm text-white px-3 shadow-none" data-search-for="#filtro-municipio" title="Buscar na lista" style="background-color: #103758; border: none; border-radius: 0 4px 4px 0;">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
        </div>

        <div class="filter-group">
          <label for="filtro-classificacao" class="form-label">Colorir por:</label>
          <select id="filtro-classificacao" class="form-select form-select-sm">
            <option value="quintil" selected>Quintis de Receita p/c</option>
            <option value="decil">Decis de Receita p/c</option>
            <option value="natural">Quebras Naturais (Receita)</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filtro-subgrupo" class="form-label">Quintil:</label>
          <select id="filtro-subgrupo" class="form-select form-select-sm"></select>
        </div>

        <div class="filter-group">
          <label for="filtro-modo-calculo" class="form-label">Cálculo do Quantil:</label>
          <select id="filtro-modo-calculo" class="form-select form-select-sm">
            <option value="total">País (Total)</option>
            <option value="por_filtro">Filtro Atual</option>
          </select>
        </div>
      </div>

      <div class="d-grid gap-2 mt-3">
        <button id="btn-limpar-filtros" class="btn btn-secondary w-100">
          <i class="bi bi-eraser-fill"></i> Limpar Filtros
        </button>
        <button id="btn-screenshot" type="button" class="btn btn-secondary w-100 d-flex align-items-center justify-content-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 7h-2.586l-1.707-1.707A2 2 0 0 0 15 4H9a2 2 0 0 0-1.707.293L5.586 7H3a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Zm-9 10a4 4 0 1 1 0-8 4 4 0 0 1 0 8Z"/>
          </svg>
          <span>Print Mapa</span>
        </button>
      </div>

      <div class="sidebar-spacer"></div>

      <button id="download-table-btn" type="button" class="btn btn-secondary w-100 d-flex align-items-center justify-content-center gap-2 btn-download mb-5 mb-lg-5" style="margin-bottom: 3rem !important;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V3.5a.5.5 0 0 0-1 0v6.793L5.354 8.146a.5.5 0 1 0-.708.708z"/>
          <path d="M.5 12.9v1a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-1a.5.5 0 0 0-1 0v1a1 1 0 0 1-1 1H2.5a1 1 0 0 1-1-1v-1a.5.5 0 0 0-1 0z"/>
        </svg>
        <span>Baixar Dados</span>
      </button>

    </div>
  </aside>

  <!-- CONTEÚDO DO MAPA -->
  <div class="main-content position-relative w-100">
    
    <button class="btn d-flex d-lg-none justify-content-center align-items-center rounded-circle shadow-lg position-fixed p-0" 
            type="button" 
            data-bs-toggle="offcanvas" 
            data-bs-target="#filtrosOffcanvas" 
            aria-controls="filtrosOffcanvas"
            data-bs-backdrop="false" 
            data-bs-scroll="true"
            style="width: 50px; height: 50px; bottom: 30px; left: 20px; z-index: 2000; background-color: #103758 !important; opacity: 1 !important; border: none !important;">
      <i class="fa-solid fa-magnifying-glass fs-5 text-white"></i>
    </button>

    <div id="map" class="w-100"></div>

    <div class="map-overlay-container">
      <div id="summary-card">
  <h5>Resumo do Filtro</h5>
  <p><strong>Municípios na seleção:</strong><br> <span id="summary-count">0</span></p>
  <p><strong>Receita Per Capita Média:</strong><br> <span id="summary-avg-revenue">R$ 0,00</span></p>
</div>
      <div id="legend"></div>
    </div>
  </div>
</main>

<!-- JS específicos do mapa -->
<script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
<script>
  window.MAPBOX_PUBLIC_TOKEN = "{{ MAPBOX_PUBLIC_TOKEN|escapejs }}";
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  window.LOGO_IFEM_URL = "{% static 'global/images/ifem-marca-03.png' %}";
  window.LOGO_FNP_URL  = "{% static 'global/images/logo-FNP.png' %}";
</script>

<script src="{% static 'map/js/script.js' %}"></script>

<!-- Modal de busca reutilizável -->
<div id="search-modal" class="modal fade" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header py-2">
        <input id="search-input" class="form-control" placeholder="Digite para buscar..." />
        <button type="button" class="btn-close ms-2" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body p-0">
        <ul id="search-list" class="list-group list-group-flush"></ul>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const searchModal = document.getElementById('search-modal');
    const filtrosOffcanvas = document.getElementById('filtrosOffcanvas');
    const filtersContainer = document.getElementById('filters');
    const btnLimpar = document.getElementById('btn-limpar-filtros');
    
    // Instância do Offcanvas do Bootstrap
    const offcanvasInstance = bootstrap.Offcanvas.getOrCreateInstance(filtrosOffcanvas);

    // 1. LÓGICA DE MINIMIZAR AO SELECIONAR FILTRO
    if (filtersContainer) {
      const allSelects = filtersContainer.querySelectorAll('select');
      allSelects.forEach(select => {
        select.addEventListener('change', function() {
          // Se for mobile, esconde a aba após 400ms 
          // (tempo suficiente para o usuário ver o clique, mas sem atrapalhar a animação do mapa)
          if (window.innerWidth < 992) {
            setTimeout(() => {
              offcanvasInstance.hide();
            }, 400); 
          }
        });
      });
    }

    // 2. MINIMIZAR AO CLICAR EM LIMPAR FILTROS
    if (btnLimpar) {
      btnLimpar.addEventListener('click', function() {
        if (window.innerWidth < 992) {
          setTimeout(() => {
            offcanvasInstance.hide();
          }, 300);
        }
      });
    }

    // 3. INTERAÇÃO COM O MODAL DE BUSCA (A LUPA INTERNA)
    searchModal.addEventListener('show.bs.modal', function () {
      offcanvasInstance.hide();
    });

    searchModal.addEventListener('hidden.bs.modal', function () {
      if (window.innerWidth < 992) {
        offcanvasInstance.show();
      }
    });
  });
</script>

{% endblock content %}
